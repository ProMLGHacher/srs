# Единая точка входа для голосового стека: статика voice_web + WebSocket на SFU.
upstream voice_web_app {
    server voice_web:80;
}

upstream voice_sfu_http {
    server voice_sfu:8088;
}

server {
    listen 80;
    server_name _;

    # SPA и статика
    location / {
        proxy_pass http://voice_web_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Сигналинг WebRTC
    location /ws {
        proxy_pass http://voice_sfu_http/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Проверка SFU (опционально)
    location = /voice/health {
        proxy_pass http://voice_sfu_http/health;
        proxy_set_header Host $host;
    }
}
