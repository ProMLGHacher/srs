# ICE: при CANDIDATE=* SRS подмешивает IP bridge (172.x), с хоста UDP туда не ходит → ice failed.
# Задайте CANDIDATE через env в compose: 127.0.0.1 (браузер на этом же ПК) или LAN-IP машины (192.168.x.x).
max_connections 1000;
srs_log_tank console;
daemon off;

http_api {
    enabled on;
    listen 1985;
}

http_server {
    enabled on;
    listen 8080;
    dir ./objs/nginx/html;
}

rtc_server {
    enabled on;
    listen 8000;
    candidate $CANDIDATE;
    protocol udp;
    use_auto_detect_network_ip off;
    api_as_candidates off;
    ip_family ipv4;
}

vhost __defaultVhost__ {
    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
    rtc {
        enabled on;
        rtmp_to_rtc off;
        rtc_to_rtmp off;
    }
}
