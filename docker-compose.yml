# Для звонка с ДВУХ устройств в LAN задайте SRS_CANDIDATE_IP — IPv4 хоста с Docker (ifconfig / ip a),
# например: SRS_CANDIDATE_IP=192.168.1.10 docker compose up
# Иначе в SDP попадёт 127.0.0.1: второй клиент шлёт медиа на «сам себя», ICE → failed, в логах SRS — timeout / deliver=0.
services:
  srs:
    image: ossrs/srs:6
    ports:
      - "8000:8000/udp"
    environment:
      CANDIDATE: ${SRS_CANDIDATE_IP:-127.0.0.1}
    networks: [srsnet]

  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    depends_on:
      - srs
    environment:
      SRS_HTTP: http://srs:1985
      SRS_EIP: ${SRS_CANDIDATE_IP:-127.0.0.1}
    dns_opt:
      - "ndots:0"
    networks: [srsnet]

  nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-3080}:80"
    depends_on:
      - app
      - srs
    networks: [srsnet]

networks:
  srsnet:
    driver: bridge
