# Пример для nginx перед Go-приложением (или только статикой).
# Важно: НЕ использовать try_files $uri $uri/ — суффикс $uri/ даёт 301 на «каталог»
# и ломает маршруты вида /room/<id> (редирект на /room/ с Location: ./).

server {
    listen 443 ssl;
    server_name test.example.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Если отдаёте только собранный dist без Go — fallback на index.html без $uri/:
#
#   location / {
#       try_files $uri /index.html;
#   }
