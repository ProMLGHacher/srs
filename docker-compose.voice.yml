# Голосовой стек (SFU + voice_web + nginx gateway) рядом с основным docker-compose.yml.
# Запуск вместе с основным приложением:
#   docker compose -f docker-compose.yml -f docker-compose.voice.yml up
#
# На хост: voice_gateway (HTTP/WS) + UDP-диапазон voice_sfu (медиа WebRTC). voice_web только в voicenet.
#
# WebRTC: медиа идёт по UDP напрямую на SFU (не через nginx). Проброс UDP на хост обязателен для
# звонков с браузера на этой машине / в LAN. TURN — если за NAT без проброса.
services:
  voice_sfu:
    build:
      context: .
      dockerfile: voice_sfu/Dockerfile
    restart: unless-stopped
    ports:
      - "${VOICE_UDP_PORT_MIN:-10000}-${VOICE_UDP_PORT_MAX:-10100}:10000-10100/udp"
    environment:
      VOICE_HTTP_ADDR: ":8088"
      VOICE_PUBLIC_IP: ${VOICE_PUBLIC_IP:-192.168.0.5}
      VOICE_UDP_PORT_MIN: "${VOICE_UDP_PORT_MIN:-10000}"
      VOICE_UDP_PORT_MAX: "${VOICE_UDP_PORT_MAX:-10100}"
    networks: [voicenet]

  voice_web:
    build:
      context: .
      dockerfile: voice_web/Dockerfile
    restart: unless-stopped
    networks: [voicenet]

  voice_gateway:
    build:
      context: .
      dockerfile: voice_gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${VOICE_GATEWAY_PORT:-3091}:80"
    depends_on:
      - voice_web
      - voice_sfu
    networks: [voicenet]

networks:
  voicenet:
    driver: bridge
